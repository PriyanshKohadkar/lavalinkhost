server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      snapshot: false
  server:
    password: "yourpasswordhere"
    sources:
      youtube: false
      soundcloud: true
      http: true
    bufferDurationMs: 400
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    # ↓ THIS is the fix — disables JDA-NAS which causes the libgcc error
    playerUpdateInterval: 5
    useSeekGhosting: true

koe:
  highPacketPriority: false    # ← disables JDA-NAS entirely

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - M_WEB
      - WEB
      - MUSIC
      - ANDROID_VR
      - TV

metrics:
  prometheus:
    enabled: false

sentry:
  dsn: ""

logging:
  level:
    root: INFO
    lavalink: INFO
